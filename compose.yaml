services:
  server:
    build:
      context: .
    ports:
      - 6969:6969
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - triple-network
    depends_on:
      - mongodb

  mongodb:
    image: mongo
    networks:
      - triple-network
    volumes:
      - mongodb:/data/db
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin 
      MONGO_INITDB_ROOT_PASSWORD: secret

networks:
  triple-network:

volumes:
  mongodb:
